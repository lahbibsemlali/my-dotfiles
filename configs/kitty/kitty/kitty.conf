font_family JetBrainsMono Nerd Font
# Arabic script (JetBrains Mono has no Arabic glyphs)
symbol_map U+0600-U+06FF,U+0750-U+077F,U+08A0-U+08FF,U+FB50-U+FDFF,U+FE70-U+FEFF Noto Sans Arabic
symbol_map U+1F300-U+1FAFF Noto Color Emoji
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0

# Padding and Window
window_padding_width 15
window_margin_width 5
hide_window_decorations yes
tab_bar_min_tabs 2
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

confirm_os_window_close 0
enable_audio_bell no

# Catppuccin Mocha style Base
background #1e1e2e
foreground #cdd6f4
selection_background #f5e0dc
selection_foreground #1e1e2e

cursor #f5e0dc
cursor_text_color #1e1e2e
cursor_shape block
cursor_blink_interval 0

# Match mac-like translucency
background_opacity 0.85

# Catppuccin Mocha Palette
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

url_color #89b4fa

active_border_color   #89b4fa
inactive_border_color #1e1e2e

active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
active_tab_font_style   bold
inactive_tab_foreground #cdd6f4
inactive_tab_background #1e1e2e
inactive_tab_font_style normal