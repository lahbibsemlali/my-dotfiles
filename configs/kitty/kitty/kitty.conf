font_family JetBrainsMono Nerd Font
# Arabic script (JetBrains Mono has no Arabic glyphs)
symbol_map U+0600-U+06FF,U+0750-U+077F,U+08A0-U+08FF,U+FB50-U+FDFF,U+FE70-U+FEFF Noto Sans Arabic
symbol_map U+1F300-U+1FAFF Noto Color Emoji
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0

# Padding in pts: top, right, bottom, left (larger left = more inset from window edge)
window_padding_width 6 8 6 10

confirm_os_window_close 0
enable_audio_bell no

background #12121e
foreground #e0def4
selection_background #FFFACD
selection_foreground #12121e

cursor #cccccc
cursor_text_color #12121e
cursor_shape block
cursor_blink_interval 0

background_opacity 0.85

# Rose Pine + cyan palette (matches repo theme)
color0  #3B4252
color1  #FF789E
color2  #A3BE8C
color3  #f6c177
color4  #81A1C1
color5  #c4a7e7
color6  #9ccfd8
color7  #E5E9F0
color8  #4C566A
color9  #FF789E
color10 #A3BE8C
color11 #f6c177
color12 #81A1C1
color13 #c4a7e7
color14 #8FBCBB
color15 #ECEFF4

url_color #9ccfd8

active_border_color   #f6c177
inactive_border_color #12121e

active_tab_foreground   #12121e
active_tab_background   #9ccfd8
active_tab_font_style   bold
inactive_tab_foreground #e0def4
inactive_tab_background #12121e
inactive_tab_font_style normal
