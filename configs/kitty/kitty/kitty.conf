font_family JetBrainsMono Nerd Font
symbol_map U+1F300-U+1FAFF Noto Color Emoji
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0

# Padding in pts: top, right, bottom, left (larger left = more inset from window edge)
window_padding_width 6 8 6 10

confirm_os_window_close 0
enable_audio_bell no

background #0f1221
foreground #adb4d2
selection_background #232845
selection_foreground #f5f7ff

cursor #b08cff
cursor_text_color #0f1221

# Indigo / neon palette inspired by your reference.
color0 #0f1221
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #8bd5ff
color5 #b08cff
color6 #7fd3ff
color7 #dbe2ff
color8 #4a5070
color9 #f5a9bf
color10 #b8f1b3
color11 #fde8be
color12 #9fddff
color13 #c7a7ff
color14 #99ddff
color15 #f5f7ff
