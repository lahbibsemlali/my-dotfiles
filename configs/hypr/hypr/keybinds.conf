# Keybinds (split from hyprland.conf for easier growth)

bind = $mod, Return, exec, $terminal
bind = $mod, B, exec, $browser
bind = $mod, E, exec, thunar
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, SPACE, exec, wofi --show drun
bind = $mod ALT, B, exec, ~/.config/waybar/scripts/bluetooth_wofi.sh
# English ⟷ Arabic: Alt+Shift (XKB grp), or Super+Shift+Space
bind = $mod SHIFT, SPACE, exec, ~/.config/hypr/scripts/toggle-kb-layout.sh
bind = $mod, V, exec, ~/.config/hypr/scripts/clipboard.sh
# Help menu (all keybinds overview)
bind = $mod, H, exec, ~/.config/hypr/scripts/help-menu.sh
bind = $mod, F, fullscreen, 1
bind = $mod SHIFT, W, exec, ~/.config/hypr/scripts/set-random-wallpaper.sh
bind = $mod, Print, exec, ~/.config/hypr/scripts/screenshot-area.sh
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod CTRL, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Laptop function keys
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down

bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
bindl = ,XF86AudioMicMute, exec, ~/.config/hypr/scripts/volume.sh micmute
