# Keep launchers as floating centered windows.
windowrule = float on, match:class ^(wofi)$
windowrule = center on, match:class ^(wofi)$
windowrule = float on, match:class ^(clipboard-picker)$
windowrule = center on, match:class ^(clipboard-picker)$
windowrule = size 640 400, match:class ^(clipboard-picker)$