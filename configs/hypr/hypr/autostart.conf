exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-clipboard-history -t
exec-once = ~/.config/hypr/scripts/battery-guard.sh
exec-once = bash -lc "sleep 1 && ~/.config/hypr/scripts/set-random-wallpaper.sh"

# Startup apps by workspace: 1=terminal, 2=browser, 3=Cursor
exec-once = [workspace 1 silent] $terminal
exec-once = [workspace 2 silent] $browser
exec-once = [workspace 3 silent] cursor