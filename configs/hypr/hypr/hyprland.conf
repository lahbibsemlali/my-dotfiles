# Minimal Hyprland config

monitor=,preferred,auto,1.25

env = XCURSOR_SIZE,24

input {
    # us + Arabic (PC); Alt+Shift cycles group; Super+Shift+Space also cycles (see keybinds)
    kb_layout = us,ara
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 3
    col.active_border = rgba(a591ffdd) rgba(91f8ffaa) 70deg
    col.inactive_border = rgba(404040aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
    snap:enabled = true
    snap:monitor_gap = 20
    snap:window_gap = 20
}

dwindle {
    # Always place new tiled windows to the right/bottom.
    force_split = 2
}

decoration {
    rounding = 5
    rounding_power = 5
    active_opacity = 0.9
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 5
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 3
        xray = true
        popups = true
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Keep launchers as floating centered windows.
windowrule = float on, match:class ^(wofi)$
windowrule = center on, match:class ^(wofi)$

exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = bash -lc "sleep 1 && ~/.config/hypr/scripts/set-random-wallpaper.sh"

$mod = SUPER
$terminal = kitty
$browser = google-chrome-stable

source = ~/.config/hypr/keybinds.conf
